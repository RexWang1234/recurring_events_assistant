# Calendar Assistant Configuration
# Requires .env with ANTHROPIC_API_KEY, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

events:
  - name: Haircut
    shop_name: "NEX Barbershop"
    calendar_event_name: "Haircut"
    frequency_weeks: 4
    alert_days_before: 7
    booking_url: "https://booksy.com/en-ca/21441_nex-barbershop_barbershop_773207_oakville"
    booking_preferences: "Saturday morning, any stylist"
    calendar_search_keywords: ["haircut", "hair", "salon"]

  - name: Massage
    shop_name: "Mobility Plus Chiropractic"
    calendar_event_name: "Massage"
    frequency_weeks: 2
    alert_days_before: 7
    booking_url: "https://mobilitypluschiropractic.janeapp.com/"
    booking_preferences: "Weekday afternoon, 60 min deep tissue"
    calendar_search_keywords: ["massage", "deep tissue", "mobility plus"]

